name: Compile & Package Unified Plugin Bundle

on:
  push:
    branches: [ "main" ]

jobs:
  compile-and-package:
    runs-on: windows-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSBuild Environment
      uses: microsoft/setup-msbuild@v2

    - name: Initialize Project Workspace Compilation Matrix
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Compile All Six Architecture Plugins Parallelly
      run: |
        cmake --build build --config Release --parallel 6

    - name: Install Inno Setup Compiler Compiler Tools
      run: choco install innosetup

    - name: Package System Binaries into Standalone Installer Executable
      run: |
        iscc installer/master_bundle_setup.iss

    - name: Deploy Finished Release Package Asset to GitHub Releases Tab
      uses: softprops/action-gh-release@v2
      with:
        files: installer/Output/Sovereign-Archon-Bundle-Windows-Installer.exe
        tag_name: v6.0.0-Archon-Release
        name: Sovereign Archon Suite v6.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
